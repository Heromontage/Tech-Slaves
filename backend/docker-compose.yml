version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentinelflow
      POSTGRES_PASSWORD: sentinelflow
      POSTGRES_DB: sentinelflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12.0
    environment:
      NEO4J_AUTH: neo4j/sentinelflow
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: