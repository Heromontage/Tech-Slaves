version: "3.9"

services:

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sentinelflow_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinelflow:sentinelflow@postgres:5432/sentinelflow
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: sentinelflow
      ENV: development
    volumes:
      # Mount source for hot-reload during development
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinelflow_net

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelflow_postgres
    environment:
      POSTGRES_USER: sentinelflow
      POSTGRES_PASSWORD: sentinelflow
      POSTGRES_DB: sentinelflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelflow -d sentinelflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sentinelflow_net

  # ── Neo4j graph database ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: sentinelflow_neo4j
    environment:
      NEO4J_AUTH: neo4j/sentinelflow
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - sentinelflow_net

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:

networks:
  sentinelflow_net:
    driver: bridge
